aid: hyundai-bluelink
name: Hyundai Bluelink
description: >-
  Hyundai Bluelink is Hyundai Motor America's connected vehicle service for
  Hyundai owners, providing remote vehicle control, vehicle status and
  diagnostics, navigation and route services, safety and security features,
  and EV-specific charging and climate management. Bluelink is delivered to
  owners through the MyHyundai with Bluelink mobile app (iOS and Android),
  the in-vehicle infotainment head unit, the owner web portal at
  owners.hyundaiusa.com, and connected smart-home and voice integrations
  (Amazon Alexa, Google Assistant, smartwatch apps). Feature sets vary by
  model year and subscription tier — typically Bluelink, Bluelink+, and
  Bluelink Connected Care / Remote / Guidance bundles — and include remote
  start with climate, remote door lock/unlock, remote horn and lights,
  vehicle finder, stolen vehicle recovery and SVI, automatic collision
  notification, SOS emergency assistance, monthly vehicle health reports,
  destination search (powered by Google), in-vehicle Wi-Fi hotspot (via AT&T
  on supported models), and EV-specific remote charge start/stop, charge
  schedule, charge-level monitoring, and pre-conditioning. Bluelink is a
  consumer-facing, owner-authenticated service. Hyundai does not publish a
  public developer portal, public OpenAPI specification, or self-serve API
  keys for third-party integration with Bluelink vehicle endpoints; access
  is limited to authenticated owners through Hyundai's first-party apps and
  to enterprise partners under contract (fleet, insurance telematics,
  charging networks, smart-home platforms). A community ecosystem of
  reverse-engineered, unofficial Python and Node.js clients
  (Hyundai-Kia-Connect/hyundai_kia_connect_api, Home Assistant integrations,
  Bluelinky) is used by enthusiasts and home automation users, but these
  are not endorsed, supported, or governed by Hyundai and may break at any
  time.
